dumpscript:
  nameOverride: "dumpscript"
  fullnameOverride: "dumpscript"

  image:
    repository: ghcr.io/cloudscript-technology/dumpscript
    pullPolicy: IfNotPresent
    # Default is the chart appVersion
    tag: ""

  databases:
  # Example: S3 backend (default)
  - type: postgresql
    version: "16"
    periodicity:
    - type: daily
      retentionDays: 7
      schedule: "0 1 * * *" # Every day at 1am
    - type: weekly
      retentionDays: 30
      schedule: "0 2 * * 0" # Every monday at 2am
    - type: monthly
      retentionDays: 365
      schedule: "0 3 1 * *" # Every first day of the month at 3am
    connectionInfo:
      host: "my-host"
      port: 5432
      username: "my-username"
      password: "my-password"
      database: "my-database-name"
    aws:
      region: "us-east-1"
      bucket: "my-bucket-name"
      bucketPrefix: "my-database-name"
    extraArgs: "--format plain --encoding UTF8"

  # Example: Azure Blob Storage backend
  # - type: postgresql
  #   version: "16"
  #   periodicity:
  #   - type: daily
  #     retentionDays: 7
  #     schedule: "0 1 * * *"
  #   connectionInfo:
  #     host: "my-host"
  #     port: 5432
  #     username: "my-username"
  #     password: "my-password"
  #     database: "my-database-name"
  #   storage:
  #     backend: "azure"
  #     azure:
  #       storageAccount: "mystorageaccount"
  #       storageKey: "mybase64encodedkey..."  # or use secretName
  #       # sasToken: "sv=2021-06-08&ss=b&..."  # alternative to storageKey
  #       container: "db-backups"
  #       prefix: "my-database-name"
  #   extraArgs: "--format plain --encoding UTF8"

  notifications:
    slack:
      enabled: false
      webhookUrl: "https://hooks.slack.com/services/path/to/your/webhook"
      channel: "my-alerts-channel"
      username: "Dumpscript Bot"
      notifyOnSuccess: true

  serviceAccount:
    create: true
    automount: true
    annotations:
      # S3 backend: use IRSA for AWS authentication
      eks.amazonaws.com/role-arn: "arn:aws:iam::<aws-account-id>:role/<role-name>"
      # Azure backend: use Workload Identity for Azure authentication
      # azure.workload.identity/client-id: "<azure-client-id>"
    name: "dumpscript"
    namespace: "dumpscript"
