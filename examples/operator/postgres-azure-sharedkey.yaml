# PostgreSQL → Azure Blob with Shared Key.
#
# Required Secrets:
#   pg-prod-creds       keys: username, password
#   azure-prod-creds    keys: sharedKey
#   slack-webhook       keys: url
#
# For SAS-based auth, swap `sharedKeyKey: sharedKey` → `sasTokenKey: sasToken`
# in the Secret and in this CR.
---
apiVersion: dumpscript.cloudscript.com.br/v1alpha1
kind: BackupSchedule
metadata:
  name: pg-prod-daily-azure
  namespace: backups
spec:
  schedule: "0 2 * * *"
  periodicity: daily
  retentionDays: 30

  database:
    type: postgresql
    host: pg.prod.svc
    name: app
    credentialsSecretRef:
      name: pg-prod-creds

  storage:
    backend: azure
    azure:
      account: prodbackups
      container: dumps
      prefix: pg
      credentialsSecretRef:
        name: azure-prod-creds
        sharedKeyKey: sharedKey

  notifications:
    notifySuccess: true
    slack:
      webhookSecretRef:
        name: slack-webhook
        key: url
