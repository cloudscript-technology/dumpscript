# PostgreSQL → GCS native using GKE Workload Identity (zero secrets).
#
# Required Secrets:
#   pg-prod-creds    keys: username, password
#   slack-webhook    keys: url
#
# Workload Identity setup (one-time):
#   1. Create the GSA and grant bucket access:
#        gcloud iam service-accounts create dumpscript-backup
#        gcloud storage buckets add-iam-policy-binding gs://prod-backups-gcs \
#          --member=serviceAccount:dumpscript-backup@PROJECT.iam.gserviceaccount.com \
#          --role=roles/storage.objectAdmin
#   2. Bind the KSA to the GSA:
#        gcloud iam service-accounts add-iam-policy-binding \
#          dumpscript-backup@PROJECT.iam.gserviceaccount.com \
#          --role=roles/iam.workloadIdentityUser \
#          --member='serviceAccount:PROJECT.svc.id.goog[backups/dumpscript-pg]'
#   3. Annotate the KSA:
#        kubectl annotate sa dumpscript-pg -n backups \
#          iam.gke.io/gcp-service-account=dumpscript-backup@PROJECT.iam.gserviceaccount.com
---
apiVersion: dumpscript.cloudscript.com.br/v1alpha1
kind: BackupSchedule
metadata:
  name: pg-prod-daily-gcs
  namespace: backups
spec:
  schedule: "0 2 * * *"
  periodicity: daily
  retentionDays: 30

  serviceAccountName: dumpscript-pg

  database:
    type: postgresql
    host: pg.prod.svc
    name: app
    credentialsSecretRef:
      name: pg-prod-creds

  storage:
    backend: gcs
    gcs:
      bucket: prod-backups-gcs
      prefix: pg
      projectID: my-prod-project
      # No `credentialsSecretRef` block — Application Default Credentials resolves
      # via the metadata server (Workload Identity).

  notifications:
    notifySuccess: false
    slack:
      webhookSecretRef:
        name: slack-webhook
        key: url
      channel: "#database-alerts"
