apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mirror.gcr.io/library/mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: testpassword
            - name: MYSQL_USER
              value: testuser
            - name: MYSQL_PASSWORD
              value: testpassword
            - name: MYSQL_DATABASE
              value: testdb
          ports:
            - name: mysql
              containerPort: 3306
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - "127.0.0.1"
                - -u
                - testuser
                - -ptestpassword
            initialDelaySeconds: 15
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  selector:
    app: mysql
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  type: ClusterIP
