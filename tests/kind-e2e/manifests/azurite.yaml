apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  labels:
    app: azurite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          image: mcr.microsoft.com/azure-storage/azurite:latest
          # Same flags as the testcontainers e2e: --loose tolerates emulator quirks,
          # --skipApiVersionCheck accepts SDKs sending newer x-ms-version values.
          args:
            - "azurite-blob"
            - "--blobHost"
            - "0.0.0.0"
            - "--loose"
            - "--skipApiVersionCheck"
          ports:
            - name: blob
              containerPort: 10000
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  labels:
    app: azurite
spec:
  selector:
    app: azurite
  ports:
    - name: blob
      port: 10000
      targetPort: 10000
  type: ClusterIP
