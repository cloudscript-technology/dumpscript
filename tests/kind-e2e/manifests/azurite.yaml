apiVersion: apps/v1
kind: Deployment
metadata:
  name: azurite
  labels:
    app: azurite
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azurite
  template:
    metadata:
      labels:
        app: azurite
    spec:
      containers:
        - name: azurite
          # Pinned to 3.34.0 — :latest had inconsistent container-state
          # behavior in kind: PUT ?restype=container returned 201 from the
          # test (via port-forward, Host=localhost:14000), but subsequent
          # ops from the dumpscript pod (Host=azurite.svc.cluster.local)
          # got 404 ContainerNotFound on the same container. Pinning the
          # version stabilises the behavior.
          image: mcr.microsoft.com/azure-storage/azurite:3.34.0
          # --loose tolerates emulator quirks; --skipApiVersionCheck accepts
          # SDKs sending newer x-ms-version values.
          args:
            - "azurite-blob"
            - "--blobHost"
            - "0.0.0.0"
            - "--loose"
            - "--skipApiVersionCheck"
          ports:
            - name: blob
              containerPort: 10000
          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: azurite
  labels:
    app: azurite
spec:
  selector:
    app: azurite
  ports:
    - name: blob
      port: 10000
      targetPort: 10000
  type: ClusterIP
