---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: backupschedules.dumpscript.cloudscript.com.br
spec:
  group: dumpscript.cloudscript.com.br
  names:
    kind: BackupSchedule
    listKind: BackupScheduleList
    plural: backupschedules
    singular: backupschedule
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.schedule
      name: Schedule
      type: string
    - jsonPath: .spec.database.type
      name: Engine
      type: string
    - jsonPath: .spec.storage.backend
      name: Backend
      type: string
    - jsonPath: .status.lastSuccessTime
      name: Last-Success
      type: date
    - jsonPath: .status.lastFailureTime
      name: Last-Failure
      type: date
    - jsonPath: .spec.suspend
      name: Suspended
      type: boolean
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: BackupSchedule is the Schema for the backupschedules API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: BackupScheduleSpec is the desired state of a recurring dumpscript
              backup.
            properties:
              database:
                description: Database describes which DB to dump and how to authenticate.
                properties:
                  credentialsSecretRef:
                    description: |-
                      CredentialsSecretRef — Secret with username/password keys. Optional for
                      redis, etcd, elasticsearch and sqlite.
                      Convention: every field ending in *SecretRef points at a Secret.
                    properties:
                      name:
                        minLength: 1
                        type: string
                      passwordKey:
                        description: PasswordKey defaults to "password" when empty.
                        type: string
                      usernameKey:
                        description: UsernameKey defaults to "username" when empty.
                        type: string
                    required:
                    - name
                    type: object
                  host:
                    description: Host (or path, for sqlite). Optional for sqlite (Name
                      holds the path).
                    type: string
                  name:
                    description: Name — DB name / index / `db.table` form (clickhouse).
                    type: string
                  options:
                    description: |-
                      Options — raw extra flags forwarded to the engine CLI. Use only for
                      non-sensitive flags. Anything carrying a token (e.g. ES Bearer / ApiKey)
                      MUST go through `optionsSecretRef` so it never lands in plaintext on
                      `kubectl describe pod`.
                    type: string
                  optionsSecretRef:
                    description: |-
                      OptionsSecretRef — when set, DUMP_OPTIONS is fetched from this Secret key.
                      Takes precedence over `options` when both are provided.
                    properties:
                      key:
                        minLength: 1
                        type: string
                      name:
                        minLength: 1
                        type: string
                    required:
                    - key
                    - name
                    type: object
                  port:
                    description: Port — overrides the engine default.
                    format: int32
                    type: integer
                  type:
                    description: Type — one of the 13 supported engines.
                    enum:
                    - postgresql
                    - mysql
                    - mariadb
                    - mongodb
                    - cockroach
                    - redis
                    - sqlserver
                    - oracle
                    - elasticsearch
                    - etcd
                    - clickhouse
                    - neo4j
                    - sqlite
                    type: string
                required:
                - type
                type: object
              failedJobsHistoryLimit:
                description: |-
                  FailedJobsHistoryLimit / SuccessfulJobsHistoryLimit pass through to the
                  generated CronJob (defaults: 7 / 3).
                format: int32
                type: integer
              image:
                description: Image overrides the default dumpscript image.
                type: string
              notifications:
                description: Notifications wires Slack / Discord / Teams / Webhook
                  / Stdout.
                properties:
                  discord:
                    description: DiscordNotifier maps to DISCORD_WEBHOOK_URL.
                    properties:
                      username:
                        type: string
                      webhookSecretRef:
                        description: SecretKeyRef points at a single key inside a
                          Secret.
                        properties:
                          key:
                            minLength: 1
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - webhookSecretRef
                    type: object
                  notifySuccess:
                    type: boolean
                  slack:
                    description: SlackNotifier maps to SLACK_WEBHOOK_URL + SLACK_CHANNEL/USERNAME.
                    properties:
                      channel:
                        type: string
                      username:
                        type: string
                      webhookSecretRef:
                        description: SecretKeyRef points at a single key inside a
                          Secret.
                        properties:
                          key:
                            minLength: 1
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - webhookSecretRef
                    type: object
                  stdout:
                    type: boolean
                  teams:
                    description: TeamsNotifier maps to TEAMS_WEBHOOK_URL.
                    properties:
                      webhookSecretRef:
                        description: SecretKeyRef points at a single key inside a
                          Secret.
                        properties:
                          key:
                            minLength: 1
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - webhookSecretRef
                    type: object
                  webhook:
                    description: WebhookNotifier — generic JSON POST.
                    properties:
                      authHeaderSecretRef:
                        description: SecretKeyRef points at a single key inside a
                          Secret.
                        properties:
                          key:
                            minLength: 1
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - key
                        - name
                        type: object
                      urlSecretRef:
                        description: SecretKeyRef points at a single key inside a
                          Secret.
                        properties:
                          key:
                            minLength: 1
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - key
                        - name
                        type: object
                    required:
                    - urlSecretRef
                    type: object
                type: object
              periodicity:
                description: Periodicity controls the storage prefix layout and the
                  retention sweep window.
                enum:
                - daily
                - weekly
                - monthly
                - yearly
                type: string
              retentionDays:
                description: |-
                  RetentionDays — backups older than this are deleted before each run.
                  0 disables retention.
                format: int32
                minimum: 0
                type: integer
              schedule:
                description: Schedule is the cron expression that drives the underlying
                  CronJob.
                minLength: 1
                type: string
              serviceAccountName:
                description: |-
                  ServiceAccountName runs the CronJob pod under this KSA — required for
                  IRSA (EKS) or Workload Identity (GKE).
                type: string
              storage:
                description: Storage selects the destination backend (S3, Azure, or
                  GCS).
                properties:
                  azure:
                    description: AzureStorage configures Azure Blob.
                    properties:
                      account:
                        type: string
                      container:
                        type: string
                      credentialsSecretRef:
                        description: AzureCredentialsSecretRef holds either a Shared
                          Key or a SAS token in a Secret.
                        properties:
                          name:
                            minLength: 1
                            type: string
                          sasTokenKey:
                            description: SASTokenKey is the Secret key holding a SAS
                              token (alternative to SharedKey).
                            type: string
                          sharedKeyKey:
                            description: SharedKeyKey is the Secret key holding the
                              Storage Account Shared Key.
                            type: string
                        required:
                        - name
                        type: object
                      endpoint:
                        type: string
                      prefix:
                        type: string
                    required:
                    - account
                    - container
                    type: object
                  backend:
                    description: Backend — s3, azure, or gcs.
                    enum:
                    - s3
                    - azure
                    - gcs
                    type: string
                  chunkSize:
                    type: string
                  concurrency:
                    format: int32
                    type: integer
                  gcs:
                    description: |-
                      GCSStorage configures the native GCS backend (uses Application Default
                      Credentials — typically Workload Identity on GKE).
                    properties:
                      bucket:
                        type: string
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef — optional override; mounts a Service Account JSON key
                          as a read-only volume. Leave empty in GKE to use Workload Identity.
                        properties:
                          keyFile:
                            description: KeyFile — Secret key holding the JSON file
                              (defaults to "key.json").
                            type: string
                          name:
                            minLength: 1
                            type: string
                        required:
                        - name
                        type: object
                      prefix:
                        type: string
                      projectID:
                        type: string
                    required:
                    - bucket
                    type: object
                  s3:
                    description: |-
                      S3Storage configures any S3-compatible backend (AWS, MinIO, GCS via HMAC,
                      Wasabi, B2 via endpoint override, etc.).
                    properties:
                      bucket:
                        type: string
                      credentialsSecretRef:
                        description: |-
                          CredentialsSecretRef — Secret with AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
                          (and optional AWS_SESSION_TOKEN). Omit when using IRSA.
                        properties:
                          accessKeyIDKey:
                            description: AccessKeyIDKey defaults to "AWS_ACCESS_KEY_ID".
                            type: string
                          name:
                            minLength: 1
                            type: string
                          secretAccessKeyKey:
                            description: SecretAccessKeyKey defaults to "AWS_SECRET_ACCESS_KEY".
                            type: string
                          sessionTokenKey:
                            description: SessionTokenKey is optional; only used when
                              present in the Secret.
                            type: string
                        required:
                        - name
                        type: object
                      endpointURL:
                        type: string
                      prefix:
                        type: string
                      region:
                        type: string
                      roleARN:
                        description: |-
                          RoleARN — IRSA assume-role ARN. When set, the controller wires
                          AWS_ROLE_ARN and skips static keys.
                        type: string
                      storageClass:
                        type: string
                    required:
                    - bucket
                    type: object
                  uploadCutoff:
                    description: |-
                      UploadCutoff / ChunkSize / Concurrency override the dumpscript upload
                      tuning defaults (200M / 100M / 4).
                    type: string
                required:
                - backend
                type: object
              successfulJobsHistoryLimit:
                format: int32
                type: integer
              suspend:
                description: Suspend pauses the CronJob without deleting the resource.
                type: boolean
            required:
            - database
            - periodicity
            - schedule
            - storage
            type: object
          status:
            description: BackupScheduleStatus reflects the most recent state observed.
            properties:
              conditions:
                description: |-
                  Conditions follow the standard k8s metav1.Condition contract.
                  Common types: Ready, Healthy.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              currentRun:
                description: CurrentRun — name of the BackupRun that is in progress,
                  "" when idle.
                type: string
              lastFailureTime:
                description: LastFailureTime — wall-clock of the most recent failed
                  run.
                format: date-time
                type: string
              lastScheduleTime:
                description: LastScheduleTime — wall-clock when the controller last
                  triggered a run.
                format: date-time
                type: string
              lastSuccessTime:
                description: LastSuccessTime — wall-clock of the most recent successful
                  run.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
